apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secrets.providerClassName }}
  namespace: {{ .Values.namespace.name }}
spec:
  provider: gke
  parameters:
    secrets: |
      - resourceName: "projects/{{ .Values.project.id }}/secrets/customer_name-{{ .Values.project.environment }}/versions/latest"
        path: "CUSTOMER_NAME"
      - resourceName: "projects/{{ .Values.project.id }}/secrets/metrics_user-{{ .Values.project.environment }}/versions/latest"
        path: "METRICS_USER"
      - resourceName: "projects/{{ .Values.project.id }}/secrets/metrics_password-{{ .Values.project.environment }}/versions/latest"
        path: "METRICS_PASSWORD"