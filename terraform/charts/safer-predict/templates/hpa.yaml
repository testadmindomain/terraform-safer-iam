apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: csam-classifier
  namespace: {{ .Values.namespace.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: csam-classifier
  minReplicas: {{ .Values.replicaCount.csamClassifier }}
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70