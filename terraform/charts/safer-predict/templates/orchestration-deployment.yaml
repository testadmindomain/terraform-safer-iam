apiVersion: apps/v1
kind: Deployment
metadata:
  name: safer-orchestration
  namespace: {{ .Values.namespace.name }}
  labels:
    app: safer-orchestration
    environment: {{ .Values.project.environment | quote }}
    service: safer-predict
spec:
  replicas: {{ .Values.replicaCount.orchestration }}
  selector:
    matchLabels:
      app: safer-orchestration
  template:
    metadata:
      labels:
        app: safer-orchestration
        environment: {{ .Values.project.environment | quote }}
        service: safer-predict
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      volumes:
        - name: safer-secrets-store
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.secrets.providerClassName }}
      containers:
        - name: safer-orchestration
          image: "{{ .Values.images.orchestration.repository }}:{{ .Values.images.orchestration.tag }}"
          imagePullPolicy: {{ .Values.images.orchestration.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              export CUSTOMER_NAME="$(cat /mnt/secrets-store/CUSTOMER_NAME)"
              export METRICS_USER="$(cat /mnt/secrets-store/METRICS_USER)"
              export METRICS_PASSWORD="$(cat /mnt/secrets-store/METRICS_PASSWORD)"
              exec poetry run python -m orchestration
          env:
            - name: ENABLE_API_ONLY_MODE
              value: "0"
            - name: QUEUEING_SOLUTION
              value: "PUBSUB"
            - name: GCPPUBSUB_PROJECT_NAME
              value: {{ .Values.pubsub.projectName | quote }}
            - name: QUEUE_INPUT_QUEUE
              value: {{ .Values.pubsub.orchestration.inputSubscription | quote }}
            - name: QUEUE_CSAM_CLASSIFIER_QUEUE
              value: {{ .Values.pubsub.orchestration.csamClassifierTopic | quote }}
            - name: QUEUE_PERTINENT_QUEUE
              value: {{ .Values.pubsub.orchestration.pertinentTopic | quote }}
            - name: QUEUE_NOT_PERTINENT_QUEUE
              value: {{ .Values.pubsub.orchestration.notPertinentTopic | quote }}
            - name: METRICS_ENVIRONMENT
              value: {{ .Values.metrics.environment | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: GCS_PROJECT_NAME
              value: {{ .Values.gcs.projectName | quote }}
            - name: GCS_USER_AGENT
              value: {{ .Values.gcs.userAgent | quote }}
            - name: URL_HTTPS_ONLY
              value: {{ .Values.url.httpsOnly | quote }}
            - name: URL_CONNECT_TIMEOUT
              value: {{ .Values.url.connectTimeout | quote }}
            - name: URL_READ_TIMEOUT
              value: {{ .Values.url.readTimeout | quote }}
            - name: URL_FILE_SIZE_LIMIT
              value: {{ .Values.url.fileSizeLimit | quote }}
          volumeMounts:
            - name: safer-secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
      {{ toYaml .Values.resources.orchestration | nindent 12 }}